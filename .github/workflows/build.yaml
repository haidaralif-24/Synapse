name: Build Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            icon: assets/icon.ico
            artifact_name: synapse-windows
          - os: macos-latest
            icon: assets/icon.icns
            artifact_name: synapse-macos
          - os: ubuntu-latest
            icon: assets/icon.png
            artifact_name: synapse-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flet-cli flet-desktop

      - name: Pack with flet
        shell: bash
        run: flet pack launch.py --name synapse --icon ${{ matrix.icon }} --onedir -y

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/

  release:
    name: Attach builds to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Zip each platform's build
        run: |
          cd release-assets
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - name: Create release and upload zips
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
